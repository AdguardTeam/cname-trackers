---
version: 2
plan:
  project-key: FILTERS
  key: CNAMETRACKSPECS
  name: cname-trackers

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build
Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e -x
            exec 2>&1

            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --target build-output \
              --output type=local,dest=output \
              .

            cp -r output/data/. data/
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.commit
        configuration:
          commitMessage: Periodic update
          selectedRepository: defaultRepository
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements:
    - adg-docker: 'true'

triggers:
  - cron:
      expression: 0 0 11 ? * 2

branches:
  create: manually
  delete: never
  link-to-jira: true

notifications:
  - events:
      - plan-failed
    recipients:
      - emails:
          - filters@adguard.com
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo
labels: []
other:
  concurrent-build-plugin: system-default
